<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Marsel — Comment ça marche</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --orange: #F4650C;
    --navy: #1A2244;
    --blue: #2B4C8C;
    --peach: #FBE4D2;
  }

  body {
    background: #EFEFEF;
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  .card {
    width: 100%;
    max-width: 1180px;
    background: #fff;
    border-radius: 24px;
    padding: clamp(28px, 5vw, 60px) clamp(20px, 5vw, 70px) clamp(24px, 4vw, 50px);
  }

  /* ── DESKTOP: 5-col grid ── */
  .row {
    display: grid;
    grid-template-columns: 220px 90px 1fr 90px 160px;
    align-items: center;
  }

  .col {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 220px;
  }

  /* ── STEP 1 ── */
  .step1-visual {
    position: relative;
    width: 150px;
    height: 180px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .pulse-ring {
    position: absolute;
    top: 50%; left: 50%;
    border-radius: 50%;
    border: 1.5px solid var(--orange);
    opacity: 0;
    animation: pulseOut 2.8s ease-out infinite;
  }
  .pulse-ring.r1 { width: 100px; height: 100px; animation-delay: 0s; }
  .pulse-ring.r2 { width: 100px; height: 100px; animation-delay: 0.7s; }
  .pulse-ring.r3 { width: 100px; height: 100px; animation-delay: 1.4s; }

  @keyframes pulseOut {
    0%   { transform: translate(-50%,-50%) scale(1);   opacity: 0.6; }
    100% { transform: translate(-50%,-50%) scale(2.1); opacity: 0; }
  }

  .sos-bubble { animation: bounce 2.6s ease-in-out infinite; transform-origin: center; }
  @keyframes bounce {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.06); }
  }

  /* ── ARROWS ── */
  .arrow-col { overflow: hidden; }
  .arrow-col svg { display: block; width: 100%; }

  .arrow-line {
    stroke: var(--orange);
    stroke-width: 2;
    stroke-dasharray: 6 5;
    animation: flowDash 1s linear infinite;
  }
  @keyframes flowDash { to { stroke-dashoffset: -22; } }

  /* vertical arrow (mobile) */
  .arrow-v {
    display: none;
    align-items: center;
    justify-content: center;
    height: 48px;
  }
  .arrow-v svg { height: 100%; }
  .arrow-line-v {
    stroke: var(--orange);
    stroke-width: 2;
    stroke-dasharray: 6 5;
    animation: flowDashV 1s linear infinite;
  }
  @keyframes flowDashV { to { stroke-dashoffset: -22; } }

  /* ── STEP 2 MESH ── */
  .mesh-wrap {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .mesh-svg { width: min(300px, 90vw); height: auto; aspect-ratio: 300/200; overflow: visible; }

  .mesh-line {
    stroke: var(--orange);
    stroke-width: 1.6;
    stroke-dasharray: 5 4;
    fill: none;
    opacity: 0.55;
    animation: flowDash 1.1s linear infinite;
  }
  .mesh-halo { fill: url(#haloGradient); }
  .travel-dot { fill: var(--orange); }

  .phone-node rect.body  { fill: #fff; stroke: var(--orange); stroke-width: 2.5; }
  .phone-node rect.screen { fill: var(--peach); }
  .phone-node text {
    fill: var(--orange);
    font-size: 14px;
    font-weight: 800;
    font-family: 'Inter', sans-serif;
  }

  .phone-node { animation: nodeGlow 2.6s ease-in-out infinite; }
  .phone-node.d1 { animation-delay: 0s; }
  .phone-node.d2 { animation-delay: 0.65s; }
  .phone-node.d3 { animation-delay: 1.3s; }
  .phone-node.d4 { animation-delay: 1.95s; }

  @keyframes nodeGlow {
    0%, 100% { filter: drop-shadow(0 0 0 rgba(244,101,12,0)); }
    50%       { filter: drop-shadow(0 0 8px rgba(244,101,12,0.5)); }
  }

  /* ── STEP 3 RECIPIENTS ── */
  .recipients {
    display: flex;
    flex-direction: column;
    gap: 20px;
    align-items: center;
  }

  .recipient-icon {
    width: 64px;
    height: 64px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .recipient-icon.blue  { background: var(--blue); }
  .recipient-icon.navy  { background: var(--navy); }

  /* ── LABELS ── */
  .labels {
    display: grid;
    grid-template-columns: 220px 90px 1fr 90px 160px;
    margin-top: 28px;
  }

  .label-block {
    text-align: center;
    padding: 0 8px;
  }
  .label-block h3 {
    font-size: clamp(13px, 1.3vw, 16px);
    font-weight: 800;
    color: var(--orange);
    margin-bottom: 6px;
    white-space: nowrap;
  }
  .label-block p {
    font-size: clamp(11px, 1.1vw, 13px);
    color: var(--navy);
    line-height: 1.55;
    opacity: 0.85;
  }
  .label-2 h3 { white-space: normal; }


  /* ════════════════════════════════════
     TABLET  ≤ 900px
     ════════════════════════════════════ */
  @media (max-width: 900px) {
    .row {
      grid-template-columns: 180px 70px 1fr 70px 140px;
    }
    .labels {
      grid-template-columns: 180px 70px 1fr 70px 140px;
    }
    .col { height: 190px; }
    .step1-visual { width: 130px; height: 155px; }
    .recipient-icon { width: 56px; height: 56px; border-radius: 12px; }
  }


  /* ════════════════════════════════════
     MOBILE  ≤ 620px  — vertical stack
     ════════════════════════════════════ */
  @media (max-width: 620px) {

    body { padding: 16px; align-items: flex-start; }

    .card { border-radius: 16px; padding: 32px 20px 28px; }

    /* Stack everything vertically */
    .row {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .col {
      height: auto;
      width: 100%;
      padding: 8px 0;
    }

    /* Hide horizontal arrows */
    .arrow-col { display: none; }

    /* Show vertical arrows */
    .arrow-v { display: flex; }

    /* Step 1 */
    .step1-visual { width: 120px; height: 145px; }
    .pulse-ring.r1,
    .pulse-ring.r2,
    .pulse-ring.r3 { width: 80px; height: 80px; }

    /* Mesh full width */
    .mesh-wrap { padding: 0 8px; }
    .mesh-svg { width: min(260px, 85vw); }

    /* Recipients row on mobile */
    .recipients {
      flex-direction: row;
      gap: 16px;
    }

    /* Labels stacked */
    .labels {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      margin-top: 0;
    }

    /* Each label sits right after its visual — achieved by
       interleaving label-blocks with a small arrow placeholder */
    .label-block {
      width: 100%;
      text-align: center;
      padding: 4px 16px 16px;
    }
    .label-block h3 {
      font-size: 15px;
      white-space: normal;
    }
    .label-block p { font-size: 13px; }
    .label-2 h3 { white-space: normal; }

    /* hide empty spacers in label grid */
    .labels > div:empty { display: none; }
  }
</style>
</head>
<body>
<div class="card">

  <!-- MAIN VISUAL ROW -->
  <div class="row">

    <!-- STEP 1 -->
    <div class="col">
      <div class="step1-visual">
        <div class="pulse-ring r1"></div>
        <div class="pulse-ring r2"></div>
        <div class="pulse-ring r3"></div>
        <svg width="100" height="120" viewBox="0 0 100 120" style="position:relative;z-index:2;">
          <path d="M16 120 C14 102 12 88 14 74 C15 67 19 63 23 63 L23 47 C23 42 27 38 32 38 C37 38 41 42 41 47 L41 32 C41 27 45 23 50 23 C55 23 59 27 59 32 L59 41 C59 36 63 32 68 32 C73 32 77 36 77 41 L77 82 C77 100 73 111 67 119 Z" fill="var(--navy)"/>
          <rect x="32" y="6" width="42" height="72" rx="9" fill="#fff" stroke="var(--navy)" stroke-width="2.5"/>
          <rect x="38" y="13" width="30" height="52" rx="3" fill="var(--peach)"/>
          <g class="sos-bubble">
            <circle cx="53" cy="38" r="18" fill="var(--orange)"/>
            <text x="53" y="43" text-anchor="middle" fill="#fff" font-size="12" font-weight="800" font-family="Inter,sans-serif">SOS</text>
          </g>
        </svg>
      </div>
    </div>

    <!-- ARROW 1 (horizontal, desktop/tablet) -->
    <div class="col arrow-col">
      <svg viewBox="0 0 100 20" height="20">
        <line x1="2" y1="10" x2="84" y2="10" class="arrow-line"/>
        <polyline points="76,3 90,10 76,17" fill="none" stroke="var(--orange)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- VERTICAL ARROW 1 (mobile) -->
    <div class="arrow-v">
      <svg viewBox="0 0 20 48" width="20">
        <line x1="10" y1="2" x2="10" y2="36" class="arrow-line-v"/>
        <polyline points="3,30 10,42 17,30" fill="none" stroke="var(--orange)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- STEP 2 — symmetric diamond mesh -->
    <div class="col">
      <div class="mesh-wrap">
        <svg class="mesh-svg" viewBox="0 0 300 200">
          <defs>
            <radialGradient id="haloGradient" cx="50%" cy="50%" r="50%">
              <stop offset="0%"   stop-color="#FBE4D2" stop-opacity="0.55"/>
              <stop offset="100%" stop-color="#FBE4D2" stop-opacity="0"/>
            </radialGradient>
          </defs>

          <circle class="mesh-halo" cx="150" cy="100" r="105"/>

          <!-- connections -->
          <path class="mesh-line" d="M150,38 L84,100"  style="animation-delay:0s"/>
          <path class="mesh-line" d="M150,38 L216,100" style="animation-delay:0.15s"/>
          <path class="mesh-line" d="M84,100 L150,162" style="animation-delay:0.3s"/>
          <path class="mesh-line" d="M216,100 L150,162" style="animation-delay:0.45s"/>
          <path class="mesh-line" d="M84,100 L216,100" style="animation-delay:0.6s"/>

          <!-- traveling dots -->
          <circle class="travel-dot" r="4">
            <animateMotion dur="2.6s" repeatCount="indefinite" path="M84,100 L150,38 L216,100"/>
          </circle>
          <circle class="travel-dot" r="3.5" opacity="0.6">
            <animateMotion dur="2.6s" begin="1.0s" repeatCount="indefinite" path="M84,100 L150,162 L216,100"/>
          </circle>

          <!-- top -->
          <g class="phone-node d1" transform="translate(128,16)">
            <rect class="body" width="44" height="48" rx="8"/>
            <rect class="screen" x="6" y="6" width="32" height="36" rx="2"/>
            <text x="22" y="29" text-anchor="middle">m</text>
          </g>
          <!-- left -->
          <g class="phone-node d2" transform="translate(62,76)">
            <rect class="body" width="44" height="48" rx="8"/>
            <rect class="screen" x="6" y="6" width="32" height="36" rx="2"/>
            <text x="22" y="29" text-anchor="middle">m</text>
          </g>
          <!-- right -->
          <g class="phone-node d3" transform="translate(194,76)">
            <rect class="body" width="44" height="48" rx="8"/>
            <rect class="screen" x="6" y="6" width="32" height="36" rx="2"/>
            <text x="22" y="29" text-anchor="middle">m</text>
          </g>
          <!-- bottom -->
          <g class="phone-node d4" transform="translate(128,138)">
            <rect class="body" width="44" height="48" rx="8"/>
            <rect class="screen" x="6" y="6" width="32" height="36" rx="2"/>
            <text x="22" y="29" text-anchor="middle">m</text>
          </g>
        </svg>
      </div>
    </div>

    <!-- ARROW 2 (horizontal) -->
    <div class="col arrow-col">
      <svg viewBox="0 0 100 20" height="20">
        <line x1="2" y1="10" x2="84" y2="10" class="arrow-line" style="animation-delay:0.3s"/>
        <polyline points="76,3 90,10 76,17" fill="none" stroke="var(--orange)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- VERTICAL ARROW 2 (mobile) -->
    <div class="arrow-v">
      <svg viewBox="0 0 20 48" width="20">
        <line x1="10" y1="2" x2="10" y2="36" class="arrow-line-v" style="animation-delay:0.3s"/>
        <polyline points="3,30 10,42 17,30" fill="none" stroke="var(--orange)" stroke-width="2.2" stroke-linejoin="round" stroke-linecap="round"/>
      </svg>
    </div>

    <!-- STEP 3 -->
    <div class="col">
      <div class="recipients">
        <div class="recipient-icon blue">
          <svg width="32" height="32" viewBox="0 0 34 34" fill="none">
            <circle cx="11" cy="11" r="4.5" fill="#fff"/>
            <circle cx="23" cy="11" r="4.5" fill="#fff" opacity="0.85"/>
            <circle cx="17" cy="9"  r="5"   fill="#fff" opacity="0.95"/>
            <path d="M4 27c0-5 3-8 7-8h12c4 0 7 3 7 8" fill="#fff"/>
          </svg>
        </div>
        <div class="recipient-icon navy">
          <svg width="32" height="32" viewBox="0 0 34 34" fill="none">
            <path d="M17 3l11 4v8c0 8-5 13-11 16-6-3-11-8-11-16V7l11-4z" fill="#fff"/>
            <path d="M11 17l4 4 8-8" stroke="var(--navy)" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
      </div>
    </div>

  </div>

  <!-- LABELS — same 5-col grid (collapses to flex-col on mobile) -->
  <div class="labels">
    <div class="label-block">
      <h3>1. Besoin d'aide</h3>
      <p>La victime déclenche une alerte</p>
    </div>
    <div></div>
    <div class="label-block label-2">
      <h3>2. Le réseau Marsel prend le relais</h3>
      <p>L'alerte est relayée de téléphone en téléphone à proximité</p>
    </div>
    <div></div>
    <div class="label-block">
      <h3>3. Alerte transmise</h3>
      <p>Les proches et la sécurité reçoivent l'alerte et la localisation</p>
    </div>
  </div>

</div>
</body>
</html>
